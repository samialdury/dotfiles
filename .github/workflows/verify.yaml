name: verify

on:
  push:
  pull_request:

jobs:
  dotfiles:
    name: dotfiles
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install verification dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y zsh

      # Scope to actively-used scripts; vendored .agents/skills/* scripts are intentionally excluded.
      - name: Run shellcheck
        run: shellcheck -x install.sh .claude/statusline-command.sh

      - name: Run verification harness
        run: ./scripts/test-install.sh
