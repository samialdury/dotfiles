name: shellcheck

on:
  push:

jobs:
  lint:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # shellcheck is preinstalled on GitHub's Ubuntu runners.
      # Scope to actively-used scripts; .bash/* (rollback-only) and vendored
      # .agents/skills/* scripts are intentionally excluded.
      - name: Run shellcheck
        run: shellcheck install.sh .claude/statusline-command.sh
